node_test:
  timeout_seconds: 8
  message: "What is your favorite hobby and why? Keep your response to one sentence."
  direction: "a_to_b"
  allow_public_forwarding: false
  # Enable bidirectional for AI responses
  allow_reverse_direction: true

ai:
  api_url: "http://127.0.0.1:8080/api/chat/completions"
  api_key: "YOUR_API_KEY"
  model_id: "mistral-nemolatest-tuds-nlkl"
  memory_limit: 20
  streaming: false
  openwebui_autostart: true
  openwebui_data_dir: "C:\\Path\\To\\OpenWebUI\\Data"
  openwebui_cors_allow_origin: "http://localhost:8080"
  openwebui_user_agent: "OpenWebUI-User"
  openwebui_python: "3.11"
  openwebui_log_file: "openwebui.log"
  # Optional: Webhook for pushing responses back to web UI
  webui_webhook_url: "http://127.0.0.1:8080/api/chat/messages"  # Varies by OpenWebUI version

bot_behavior:
  active: true
  reply_to_all: true
  chunk_bytes: 200
  debug_auto_reply: true
  allow_self_processing: true  # Enable for circular AI conversations
  circular_max_iterations: 3  # Max AI responses in loop
  # Library mode with persistent connection (RECOMMENDED - keeps serial port open)
  use_library_polling: true
  library_poll_interval_sec: 1.0  # Poll every 1 second (persistent connection)
  monitor_restart_min_interval_sec: 2.5  # Only used in CLI mode

network:
  ws_port: 8765

system:
  log_level: "INFO"