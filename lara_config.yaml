node_test:
  timeout_seconds: 8
  message: "What is your favorite hobby and why? Keep your response to one sentence."
  direction: "a_to_b"
  allow_public_forwarding: false
  # Enable bidirectional for AI responses
  allow_reverse_direction: true

ai:
  api_url: "http://127.0.0.1:8080/api/chat/completions"
  api_key: "sk-89c326f7bf0b48adba935efad4e240a6"
  model_id: "mistral-nemolatest-tuds-nlkl"
  memory_limit: 15  # Number of message PAIRS (user+assistant) to keep in context (30 messages total)
  streaming: false
  openwebui_autostart: true
  openwebui_data_dir: "E:\\Users\\M\\Documents\\LLM\\Doomsday_files"
  openwebui_ollama_url: "http://127.0.0.1:11434"
  openwebui_cors_allow_origin: "http://localhost:8080"
  openwebui_user_agent: "OpenWebUI-User"
  openwebui_python: "3.11"
  openwebui_log_file: "openwebui.log"
  openwebui_startup_timeout: 180  # Wait up to 3 minutes for models to load
  # Optional: Webhook for pushing responses back to web UI
  webui_webhook_url: "http://127.0.0.1:8080/api/chat/messages"  # Varies by OpenWebUI version
  webui_webhook_disable_on_405: true  # Auto-disable webhook if endpoint returns 405

bot_behavior:
  active: true
  reply_to_all: true
  chunk_chars: 145  # Max chars per message (5 chars reserved for " X/Y" numbering)
  max_chunks: 3  # Max chunks an AI response can be split into
  debug_auto_reply: true
  allow_self_processing: true  # Enable for circular AI conversations
  circular_max_iterations: 3  # Max AI responses in loop
  # Library mode with persistent connection (RECOMMENDED - keeps serial port open)
  use_library_polling: true
  library_poll_interval_sec: 1.0  # Poll every 1 second (persistent connection)
  monitor_restart_min_interval_sec: 2.5  # Only used in CLI mode
  # Batch processing: aggregate multiple rapid messages into one AI call
  batch_enabled: true  # Enable batch aggregation for rapid messages
  batch_min_messages: 3  # Minimum messages to trigger batch mode
  batch_time_window_sec: 2.0  # Time window for batching (seconds)

network:
  ws_port: 8765

system:
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  enable_file_logging: true  # Enable rotating log file (lara_bot.log, max 5MB × 4 files)
  health_enabled: true
  health_host: "127.0.0.1"
  health_port: 8766